# 应用服务 WEB 访问端口
server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://120.53.225.128:3306/myDB?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: LinCong@2025

mybatis-plus:
  # XML映射文件路径，classpath代表resources根目录
  mapper-locations: classpath:mappers/*xml
  # 实体类别名包
  type-aliases-package: com.douyinlite.module
  configuration:
    # 开启下划线自动转驼峰
    map-underscore-to-camel-case: true

# Sa-Token
sa-token:
  # 请求头里存放token的key名称
  token-name: Authorization
  # token值的前缀标识
  token-prefix: Bearer
  # token过期时间，单位秒
  timeout: 2592000
  # 是否从请求头读取token
  is-read-header: true
  # 是否开启Sa-Token运行日志
  is-log: true